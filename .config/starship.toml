[gcloud]
  format = '( $symbol[$project]($style))'
  style = '#1a73e8'
  symbol = 'Ôÿü´©Å '

[git_branch]
  format = '[\($branch(:$remote_branch)\)]($style) '
  only_attached = true
  style = '#f1502f'

[git_commit]
  format = '[\($hash($tag´Ç½)\)]($style) '
  style = '#f1502f'
  tag_disabled = false

[git_metrics]
  disabled = false
  format = """
([$added](green) )\
([$deleted](red) )\
"""

[git_state]
  format = """
\\([$state(\
$progress_current/\
$progress_total)]\
($style)\
\\) """

[git_status]
  ahead = '[´àÂ](purple) '
  behind = '[´àÁ](purple) '
  conflicted = '= '
  deleted = '[Ô£ÿ](red) '
  diverged = '[´àÂ´àÁ](purple) '
