$stashed\
$ahead_behind\
$conflicted\
$renamed\
$deleted\
$staged\
$untracked\
"""
  renamed = '[ÔÅ®´©Ä](white) '
  staged = '[Ô¡æ](yellow) '
  stashed = '[\$](yellow) '
