'$schema' = 'https://starship.rs/config-schema.json'
format = """
$username($hostname/)\
$directory\
$git_branch\
$git_commit\
$package\
$git_state\
$git_status\
$git_metrics\
$fill \
$docker_context\
$container\
$gcloud\
$helm\
$kubernetes\
$pulumi\
$python\
$rust\
$swift\
$terraform\
$sudo\
$shell\
$os\
"""

palette = 'arcade'
[palettes.arcade]
  black = '#777777'
  blue = '#3399ff'
  bright-black = '#999999'
  bright-blue = '#99eeff'
  bright-cyan = '#33ccee'
  bright-green = '#00ff44'
  bright-magenta = '#eeaaff'
  bright-red = '#ff0000'
  bright-white = '#ffffff'
  bright-yellow = '#ffff00'
  cyan = '#00bbdd'
  green = '#77ff88'
  magenta = '#aa88ff'
  red = '#ff4444'
  white = '#eeeeee'
  yellow = '#eeff77'

[directory]
  format = '[$path]($style)[$read_only]($read_only_style) '
  read_only = ' ¾░īŠ'
  read_only_style = 'bright-yellow'
  repo_root_format = """
[$before_root_path]($before_repo_root_style)\
[$repo_root]($repo_root_style)[$path]($style)\
[$read_only]($read_only_style) \
"""
  repo_root_style = 'blue'
  style = '#cccccc'
  truncate_to_repo = false
  truncation_length = 5

[docker_context]
  format = ' $symbol[$context]($style)'
  style = '#2460ff'
  symbol = '’īł '

[fill]
  style = '#999999'
  # symbol = 'ŌÄ»' #u23af

  # consistent:
  # symbol = 'ŌĆÉ' #u2010
  # symbol = 'ŌĆæ' #u2011
  # symbol = 'ŌĆÆ' #u2012
  # symbol = 'ŌĆō' #u2013
  # symbol = 'ŌĆö' #u2014
  symbol = 'ŌĆĢ' #u2015

  # off center:
  # symbol = 'ŌöĆ' #u2500
  # symbol = '’æø' #nf45b

[gcloud]
  format = '( $symbol[$project]($style))'
  style = '#1a73e8'
  symbol = 'Ōśü’ĖÅ '

[git_branch]
  format = '[\($branch(:$remote_branch)\)]($style) '
  only_attached = true
  style = '#f1502f'

[git_commit]
  format = '[\($hash($tag’Ć½)\)]($style) '
  style = '#f1502f'
  tag_disabled = false

[git_metrics]
  disabled = false
  format = """
([$added](green) )\
([$deleted](red) )\
"""

[git_state]
  format = """
\\([$state(\
$progress_current/\
$progress_total)]\
($style)\
\\) """

[git_status]
  ahead = '[’ģČ](purple) '
  behind = '[’ģĄ](purple) '
  conflicted = '= '
  deleted = '[Ō£ś](red) '
  diverged = '[’ģČ’ģĄ](purple) '
  format = """
$stashed\
$ahead_behind\
$conflicted\
$renamed\
$deleted\
$staged\
$untracked\
"""
  renamed = '[ŌÅ®’ĖÄ](white) '
  staged = '[ŌŁæ](yellow) '
  stashed = '[\$](yellow) '
  untracked = '[Ō¢¬’ĖÄ](black) '

[hostname]
  format = '@[$hostname]($style)'
  style = 'green'

[kubernetes]
  disabled = false
  format = " $symbol[$context(/$namespace)]($style)"
  style = '#09c1d1'
  symbol = '¾░Ā│ '

[lua]
