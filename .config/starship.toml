'$schema' = 'https://starship.rs/config-schema.json'
format = """
$username($hostname/)\
$directory\
$git_branch\
$git_commit\
$package\
$git_state\
$git_status\
$git_metrics\
$fill \
$docker_context\
$container\
$gcloud\
$helm\
$kubernetes\
$pulumi\
$python\
$rust\
$swift\
$terraform\
$sudo\
$shell\
$os\
"""

palette = 'arcade'
[palettes.arcade]
  black = '#777777'
  blue = '#3399ff'
  bright-black = '#999999'
  bright-blue = '#99eeff'
  bright-cyan = '#33ccee'
  bright-green = '#00ff44'
  bright-magenta = '#eeaaff'
  bright-red = '#ff0000'
  bright-white = '#ffffff'
  bright-yellow = '#ffff00'
  cyan = '#00bbdd'
  green = '#77ff88'
  magenta = '#aa88ff'
  red = '#ff4444'
  white = '#eeeeee'
  yellow = '#eeff77'

[directory]
  format = '[$path]($style)[$read_only]($read_only_style) '
  read_only = ' у°Ңҫ'
  read_only_style = 'bright-yellow'
  repo_root_format = """
[$before_root_path]($before_repo_root_style) \
[$repo_root]($repo_root_style)[$path]($style)\
[$read_only]($read_only_style) \
"""
  repo_root_style = 'blue'
  style = '#cccccc'
  truncate_to_repo = false
  truncation_length = 5

[docker_context]
  format = ' $symbol[$context]($style)'
  style = '#2460ff'
  symbol = 'пҢҲ '

[fill]
  style = '#999999 bold'
  symbol = 'вҺҜ' #u23af

  # consistent:
  # symbol = 'вҖҗ' #u2010
  # symbol = 'вҖ‘' #u2011
  # symbol = 'вҖ’' #u2012
  # symbol = 'вҖ“' #u2013
  # symbol = 'вҖ”' #u2014
  # symbol = 'вҖ•' #u2015

  # off center:
  # symbol = 'в”Җ' #u2500
  # symbol = 'п‘ӣ' #nf45b

[gcloud]
  format = '( $symbol[$project]($style))'
  style = '#1a73e8'
  symbol = 'вҳҒпёҸ '

[git_branch]
  format = '[\($branch(:$remote_branch)\)]($style) '
  only_attached = true
  style = '#f1502f'

[git_commit]
  format = '[\($hash($tagпҖ«)\)]($style) '
  style = '#f1502f'
  tag_disabled = false

[git_metrics]
  disabled = false
  format = """
([$added](green) )\
([$deleted](red) )\
"""

[git_state]
  format = """
\\([$state(\
$progress_current/\
$progress_total)]\
($style)\
\\) """

[git_status]
  ahead = '[п…¶](purple) '
  behind = '[п…ө](purple) '
  conflicted = '= '
  deleted = '[вңҳ](red) '
  diverged = '[п…¶п…ө](purple) '
  format = """
$stashed\
$ahead_behind\
$conflicted\
$renamed\
$deleted\
$staged\
$untracked\
"""
  renamed = '[вҸ©пёҺ](white) '
  staged = '[вӯ‘](yellow) '
  stashed = '[\$](yellow) '
  untracked = '[в–ӘпёҺ](black) '

[hostname]
  format = '@[$hostname]($style)'
  style = 'green'

[kubernetes]
  disabled = false
  format = " $symbol[$context(/$namespace)]($style)"
  style = '#09c1d1'
  symbol = 'у° і '

[lua]
  symbol = 'оҳ  '

[nix_shell]
  symbol = 'пҢ“ '

[package]
  format = '$symbol[$version]($style) '
  style = 'white'
  symbol = 'рҹ“Ұ '
  version_format = '$raw'

[pulumi]
  format = ' $symbol[$stack]($style)'
  style = '#be5188'
  symbol = 'оЎі '

[python]
  symbol = 'оҲө '

[ruby]
  symbol = 'оһ‘ '

[rust]
  format = ' $symbol[$version]($style)'
  style = '#dea584'
  symbol = 'уұҳ— '

[shell]
  disabled = false
  format = ' > [$indicator]($style)'
  style = 'yellow'

[sudo]
  disabled = false
  format = ' рҹ‘»'

[swift]
  symbol = 'у°ӣҘ '

[username]
  format = '[$user]($style)'
  style_root = 'red'
  style_user = 'yellow'

[os]
  disabled = false
  format = ' [$symbol]($style) '
  style = 'white'

[os.symbols]
  Alpine = 'пҢҖ'
  Arch = 'пҢғ'
  Artix = 'пҢҹ'
  Debian = 'у°Јҡ'
  Fedora = 'у°®Ө'
  Linux = 'оҜҶ'
  Macos = 'пҢӮ'
  NixOS = 'пҢ“'
  Raspbian = 'пҢ•'
  Redhat = 'уұ„ӣ'
  Ubuntu = 'пҢӣ'
  Unknown = '?'
  Windows = 'у°ҚІ'
