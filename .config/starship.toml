'$schema' = 'https://starship.rs/config-schema.json'
format = """
$username($hostname/)\
$directory\
$git_branch\
$git_commit\
$package\
$git_state\
$git_status\
$git_metrics\
$fill \
$swift\
$python\
$docker_context\
$container\
$helm\
$kubernetes\
$pulumi\
$terraform\
$gcloud\
$rust\
$sudo\
$shell\
$os\
"""

[directory]
  format = '[$path]($style)[$read_only]($read_only_style) '
  read_only_style = 'bright-yellow'
  read_only = ' у°Ңҫ'
  style = '#cccccc'
  truncate_to_repo = false
  truncation_length = 5
  repo_root_style = 'blue'
  repo_root_format = """
[$before_root_path]($before_repo_root_style) \
[$repo_root]($repo_root_style)[$path]($style)\
[$read_only]($read_only_style) \
"""

[docker_context]
  format = ' пҢҲ [$context]($style)'
  style = '#2460ff'

[fill]
  style = '#999999 bold'
  symbol = 'вҺҜ' #u23af

  # dashline:
  # symbol = 'вҖ•' #u2015
  # symbol = 'вҖ”' #u2014
  # symbol = 'вҖ“' #u2013
  # symbol = 'вҖ’' #u2012
  # symbol = 'вҖ‘' #u2011
  # symbol = 'вҖҗ' #u2010

  # off center:
  # symbol = 'в”Җ' #u2500
  # symbol = 'п‘ӣ' #nf45b

[gcloud]
  format = '( вҳҒпёҸ [$project]($style))'
  style = '#1a73e8'

[git_branch]
  format = '[\($branch(:$remote_branch)\)]($style) '
  only_attached = true
  style = '#f1502f'

[git_commit]
  format = '[\($hash($tagпҖ«)\)]($style) '
  style = '#f1502f'
  tag_disabled = false

[git_metrics]
  disabled = false
  format = """
([$added](green) )\
([$deleted](red) )\
"""

[git_state]
  format = """
\\([$state(\
$progress_current/\
$progress_total)]\
($style)\
\\) """

[git_status]
  conflicted = '= '
  ahead = '[п…¶](purple) '
  behind = '[п…ө](purple) '
  diverged = '[п…¶п…ө](purple) '
  untracked = '[в–ӘпёҺ](black) '
  deleted = '[вңҳ](red) '
  renamed = '[вҸ©пёҺ](white) '
  staged = '[вӯ‘](yellow) '
  stashed = '[\$](yellow) '
  format = """
$stashed\
$ahead_behind\
$conflicted\
$renamed\
$deleted\
$staged\
$untracked\
"""

[hostname]
  format = '@[$hostname]($style)'
  style = 'green'

[kubernetes]
  disabled = false
  format = " у° і [$context(/$namespace)]($style)"
  style = '#09c1d1'

[lua]
  symbol = 'оҳ  '

[nix_shell]
  symbol = 'пҢ“ '

[package]
  format = 'рҹ“Ұ [$version]($style) '
  version_format = '$raw'
  style = 'white'

[pulumi]
  format = ' п”һ [$stack]($style)'
  style = '#be5188'

[python]
  symbol = 'оҲө '

[ruby]
  symbol = 'оһ‘ '

[rust]
  symbol = 'уұҳ— '

[shell]
  disabled = false
  format = ' > [$indicator]($style)'
  style = 'yellow'

[sudo]
  disabled = false
  format = ' рҹ‘»'

[swift]
  symbol = 'оқ• '

[username]
  format = '[$user]($style)'
  style_user = 'yellow'
  style_root = 'red'

[os]
  disabled = false
  format = ' [$symbol]($style) '
  style = 'white'

[os.symbols]
  Alpine = 'пҢҖ'
  Arch = 'пҢғ'
  Artix = 'пҢҹ'
  Debian = 'у°Јҡ'
  Fedora = 'у°®Ө'
  Linux = 'оҜҶ'
  Macos = 'пҢӮ'
  NixOS = 'пҢ“'
  Raspbian = 'пҢ•'
  Redhat = 'уұ„ӣ'
  Ubuntu = 'пҢӣ'
  Unknown = '?'
  Windows = 'у°ҚІ'
