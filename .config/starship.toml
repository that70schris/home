  Debian = '🌀'
  DragonFly = '🐉'
  Elementary = '🍏'
  Emscripten = '🔗'
  EndeavourOS = '🚀'
  Fedora = '🎩'
  FreeBSD = '😈'
  Garuda = '🦅'
  Gentoo = '🗜️'
  HardenedBSD = '🛡️'
  Illumos = '🐦'
  InstantOS = '⏲️'
  Ios = '📱'
  Kali = '🐉'
  Linux = '🐧'
  Mabox = '📦'
  Macos = '🍎'
  Manjaro = '🥭'
  Mariner = '🌊'
  MidnightBSD = '🌘'
  Mint = '🌿'
  NetBSD = '🚩'
  NixOS = '❄️'
  Nobara = '🎩'
  OpenBSD = '🐡'
  OpenCloudOS = '☁️'
  OracleLinux = '🦴'
  PikaOS = '🐤'
  Pop = '🍭'
  Raspbian = '🍓'
  RedHatEnterprise = '🎩'
  Redhat = '🎩'
  Redox = '🧪'
  RockyLinux = '💠'
  SUSE = '🦎'
  Solus = '⛵'
  Ubuntu = '🎯'
  Ultramarine = '🔷'
  Unknown = '❓'
  Uos = '🐲'
