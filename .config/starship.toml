'$schema' = 'https://starship.rs/config-schema.json'
format = """
$username($hostname/)\
$directory\
$git_branch\
$git_commit\
$package\
$git_state\
$git_status\
$git_metrics\
$fill \
$docker_context\
$container\
$gcloud\
$helm\
$kubernetes\
$pulumi\
$python\
$rust\
$swift\
$terraform\
$sudo\
$shell\
$os\
"""

palette = 'arcade'
[palettes.arcade]
  black = '#777777'
  blue = '#3399ff'
  bright-black = '#999999'
  bright-blue = '#99eeff'
  bright-cyan = '#33ccee'
  bright-green = '#00ff44'
  bright-magenta = '#eeaaff'
  bright-red = '#ff0000'
  bright-white = '#ffffff'
  bright-yellow = '#ffff00'
  cyan = '#00bbdd'
  green = '#77ff88'
  magenta = '#aa88ff'
  red = '#ff4444'
  white = '#eeeeee'
  yellow = '#eeff77'

[directory]
  format = '[$path]($style)[$read_only]($read_only_style) '
  read_only = ' ¾░î¥'
  read_only_style = 'bright-yellow'
  repo_root_format = """
[$before_root_path]($before_repo_root_style)\
[$repo_root]($repo_root_style)[$path]($style)\
[$read_only]($read_only_style) \
"""
  repo_root_style = 'blue'
  style = '#cccccc'
  truncate_to_repo = false
  truncation_length = 5

[docker_context]
  format = ' $symbol[$context]($style)'
  style = '#2460ff'
  symbol = '´îê '

[fill]
  style = '#999999'
  symbol = 'ÔÄ»' #u23af

  # consistent:
